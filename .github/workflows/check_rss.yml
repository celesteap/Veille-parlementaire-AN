name: Check Assemblée Nationale RSS

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write  
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}  

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run script
        env:
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
          DEST_EMAIL: ${{ secrets.DEST_EMAIL }}
        run: python main.py

      - name: Commit last_id changes
        run: |
          git config --global user.name 'RSS Bot'
          git config --global user.email 'bot@github.com'
          git add last_id.txt
          git diff --staged --quiet || git commit -m "Update last_id"
          git push
